name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          uv venv
          uv pip install "webresearch @ git+https://github.com/giladashubham/web-research.git"
          uv pip install -e . pre-commit pytest pytest-asyncio ruff

      - name: Ruff check
        run: .venv/bin/ruff check src tests

      - name: Ruff format check
        run: .venv/bin/ruff format --check src tests

      - name: Pytest
        run: .venv/bin/pytest
